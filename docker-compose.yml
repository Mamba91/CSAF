services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: csaf
      POSTGRES_PASSWORD: csaf
      POSTGRES_DB: csaf
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U csaf -d csaf']
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - '5432:5432'
  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgres://csaf:csaf@db:5432/csaf
      PORT: '4000'
    volumes:
      - ./db:/app/db:ro
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '4000:4000'

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - '8080:80'
      

volumes:
  pgdata:
